server:
  port: 8080

spring:
  application:
    name: Booking-System

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    user:
      name: boot
      password: spring

  cloud:
    gcp:
      sql:
        enabled: true
        database-name: ${DB_NAME}
        instance-connection-name: ${INSTANCE_CONNECTION_NAME}
      project-id: ${GCP_PROJECT_ID}
      credentials:
        location: classpath:gcp/gcp-key.json

admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASS}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}