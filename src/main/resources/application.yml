server:
  port: 8080

spring:
  application:
    name: Ticket-Booking-System

  # Using local db for development purposes
  datasource:
    url: jdbc:postgresql://localhost:5432/tbs
    username: "myuser"
    password: "secret"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    user:
      name: boot
      password: spring
